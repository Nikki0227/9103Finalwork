<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sketch</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <main id="layer-stack" aria-label="Interactive garden layers">
      <iframe
        class="sketch-layer timebase-layer"
        src="timebase-layer.html"
        title="Time based garden layer"
      ></iframe>
      <iframe
        class="sketch-layer userinput-layer"
        src="userinput-layer.html"
        title="User input garden layer"
      ></iframe>
      <iframe
        class="sketch-layer audiobase-layer"
        src="audiobase-layer.html"
        title="Audio garden layer"
        allow="autoplay"
      ></iframe>
    </main>

  <!-------Introduction------->
  <div id="how-to-play" class="instructions">
        <h2>• HOW TO PLAY •</h2>
        <div class="instruction-item">
            <span class="icon">🖱️</span>
            <p>Move your mouse to touch the flowers and see them react.</p>
        </div>
        <div class="instruction-item">
            <span class="icon">👆</span>
            <p>Click a flower to bloom it.</p>
        </div>
        <div class="instruction-item">
            <span class="icon">🎵</span>
            <p>Feel the rhythm, enjoy the garden!</p>
        </div>
    </div>
 <!-------Introduction------->


    <script src="Timebase_xnie0227.js"></script>
    <script src="input_controls_fcao0453.js"></script>
    <script src="Audiobase_yguo0084.js"></script>
    <script src="Berlin%20noise.js"></script>

  </body>
</html>
